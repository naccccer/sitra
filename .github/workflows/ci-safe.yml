name: Safe CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  safe-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20]
        php: ['8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Verify safe
        run: npm run verify:safe

      - name: Coverage thresholds
        if: matrix.php == '8.2'
        run: npm run test:coverage

  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Lint + PHP smoke
        run: |
          npm run lint
          npm run test:php
